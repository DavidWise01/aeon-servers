<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AEON · Railway Bridge · Elantris</title>
<!--
=========================================================
BACKEND CONTRACT (Railway)
=========================================================
POST  {BACKEND_URL}/ask
  Content-Type: application/json
  Body:   { "query": "string" }
  200:    { "answer": "string",
            "speaker": "A|B|C|H",   (optional - frontend falls back to freewill)
            "source":  "string|url" (optional) }

GET   {BACKEND_URL}/health
  200:    any body (used for connection probe)

CORS: backend must allow origin "*" or laptop origin / file://
=========================================================
-->
<style>
:root{
  --bg:#000;
  --panel:#0a0a0a;
  --border:#222;
  --ink:#e5e5e5;
  --dim:#666;
  --ok:#39ff14;
  --bad:#dc2626;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:18px;padding:24px 16px 64px}

/* CONFIG BAR */
.config{
  width:min(740px,94vw);
  display:flex;gap:8px;align-items:center;
  background:#080808;border:1px solid var(--border);border-radius:10px;padding:8px;
  font-size:12px;
}
.config input{
  flex:1;background:#000;border:1px solid #222;color:#ddd;
  padding:8px 10px;border-radius:6px;font:inherit;outline:none;
}
.config input:focus{border-color:#a855f7}
.config button{
  background:#151515;border:1px solid #333;color:#ddd;
  padding:8px 12px;border-radius:6px;cursor:pointer;font:inherit;
}
.config button:hover{border-color:#a855f7}
#status{font-size:11px;letter-spacing:.1em;padding:0 6px;color:var(--dim);min-width:130px;text-align:right}
.status-ok{color:var(--ok) !important}
.status-bad{color:var(--bad) !important}

/* AEON GLYPH */
.glyph-frame{
  width:170px;height:170px;
  display:flex;align-items:center;justify-content:center;
  transition:filter .35s, transform .25s;
  margin-top:8px;
  cursor:pointer;
}
.glyph-frame.pulse{transform:scale(1.06)}
.glyph-frame svg{width:100%;height:100%;display:block}

/* CARD */
.card{
  width:min(740px,94vw);
  background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;
}
.who{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#999;margin-bottom:10px}
.text{min-height:72px;font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* INPUT ROW */
.row{display:flex;gap:10px;width:min(740px,94vw);margin-top:4px}
.row input{
  flex:1;background:#0f0f0f;border:1px solid #2a2a2a;color:#eee;
  padding:13px 14px;border-radius:12px;font:inherit;outline:none;
}
.row input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.18)}
.row button{
  background:#151515;border:1px solid #333;color:#ddd;
  padding:0 20px;border-radius:12px;cursor:pointer;font:inherit;letter-spacing:.1em;
}
.row button:hover{border-color:#a855f7}

.foot{
  position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#333;white-space:nowrap;letter-spacing:.1em;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="config">
    <input id="backend" placeholder="https://your-app.up.railway.app" autocomplete="off">
    <button id="connect">CONNECT</button>
    <span id="status">○ DISCONNECTED</span>
  </div>

  <div class="glyph-frame" id="glyph-frame" title="Aeon">
    <svg id="glyph" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="card">
    <div class="who" id="who">AON CENTER · IDLE</div>
    <div class="text" id="text">Set Railway backend URL above. Connect. Then ask. Aeon glyph shows which voice answers.</div>
  </div>

  <div class="row">
    <input id="q" placeholder="Type a question and press Enter…" autocomplete="off" autofocus>
    <button id="send">ASK</button>
  </div>

</div>
<div class="foot">RED=CONTAIN · BLACK=MODULATE · PURPLE=EMERGE · GREEN=HONEY BADGER · WHITE=INTERNET · VIOLET=META</div>

<script>
// ======================================================
// AEONS — Elantris-style glyphs as SVG
// ======================================================
const AEONS = {
  A: { // CONTAIN — Aon Aon: circle bound by cross
    name: 'AON CONTAIN — RED',
    color: '#dc2626',
    glow: 'drop-shadow(0 0 14px #dc2626) drop-shadow(0 0 28px rgba(220,38,38,.5))',
    svg: `
      <circle cx="100" cy="100" r="62" fill="none" stroke="#dc2626" stroke-width="4"/>
      <circle cx="100" cy="100" r="22" fill="#7f1d1d" stroke="#fecaca" stroke-width="2"/>
      <line x1="20" y1="100" x2="180" y2="100" stroke="#dc2626" stroke-width="4"/>
      <line x1="100" y1="20" x2="100" y2="180" stroke="#dc2626" stroke-width="4"/>
      <circle cx="20"  cy="100" r="4" fill="#fecaca"/>
      <circle cx="180" cy="100" r="4" fill="#fecaca"/>
      <circle cx="100" cy="20"  r="4" fill="#fecaca"/>
      <circle cx="100" cy="180" r="4" fill="#fecaca"/>
    `
  },
  B: { // MODULATE — Aon Rao: wave bisecting bound circle
    name: 'AON MODULATE — BLACK',
    color: '#aaaaaa',
    glow: 'drop-shadow(0 0 12px #000) drop-shadow(0 0 24px rgba(80,80,80,.9))',
    svg: `
      <circle cx="100" cy="100" r="62" fill="#0a0a0a" stroke="#888" stroke-width="3"/>
      <path d="M 30 100 Q 60 50, 100 100 T 170 100" fill="none" stroke="#bbb" stroke-width="4"/>
      <path d="M 30 130 Q 60 80, 100 130 T 170 130" fill="none" stroke="#666" stroke-width="3"/>
      <line x1="100" y1="30" x2="100" y2="60" stroke="#888" stroke-width="3"/>
      <line x1="100" y1="160" x2="100" y2="170" stroke="#888" stroke-width="3"/>
    `
  },
  C: { // EMERGE — Aon Ien: radiant
    name: 'AON EMERGE — PURPLE',
    color: '#a855f7',
    glow: 'drop-shadow(0 0 14px #a855f7) drop-shadow(0 0 30px rgba(168,85,247,.6))',
    svg: `
      <circle cx="100" cy="100" r="38" fill="none" stroke="#a855f7" stroke-width="3"/>
      <circle cx="100" cy="100" r="14" fill="#e9d5ff"/>
      <g stroke="#a855f7" stroke-width="3">
        <line x1="100" y1="100" x2="100" y2="22"/>
        <line x1="100" y1="100" x2="178" y2="100"/>
        <line x1="100" y1="100" x2="100" y2="178"/>
        <line x1="100" y1="100" x2="22"  y2="100"/>
        <line x1="100" y1="100" x2="155" y2="45"/>
        <line x1="100" y1="100" x2="155" y2="155"/>
        <line x1="100" y1="100" x2="45"  y2="155"/>
        <line x1="100" y1="100" x2="45"  y2="45"/>
      </g>
    `
  },
  H: { // HONEY BADGER — wild spiral
    name: 'AON HONEY BADGER — GREEN',
    color: '#39ff14',
    glow: 'drop-shadow(0 0 14px #39ff14) drop-shadow(0 0 28px rgba(57,255,20,.6))',
    svg: `
      <path d="M 100 100
               m -50 0
               a 50 50 0 1 1 100 0
               a 40 40 0 1 0 -80 0
               a 30 30 0 1 1 60 0
               a 20 20 0 1 0 -40 0
               a 10 10 0 1 1 20 0"
            fill="none" stroke="#39ff14" stroke-width="3" stroke-linecap="round"/>
      <circle cx="100" cy="100" r="4" fill="#dcfce7"/>
      <line x1="40" y1="40" x2="60" y2="60" stroke="#39ff14" stroke-width="3"/>
      <line x1="160" y1="40" x2="140" y2="60" stroke="#39ff14" stroke-width="3"/>
      <line x1="40" y1="160" x2="60" y2="140" stroke="#39ff14" stroke-width="3"/>
      <line x1="160" y1="160" x2="140" y2="140" stroke="#39ff14" stroke-width="3"/>
    `
  },
  I: { // INTERNET — grid/web
    name: 'INTERNET — WHITE',
    color: '#ffffff',
    glow: 'drop-shadow(0 0 12px #fff) drop-shadow(0 0 24px rgba(255,255,255,.5))',
    svg: `
      <circle cx="100" cy="100" r="70" fill="none" stroke="#fff" stroke-width="2"/>
      <ellipse cx="100" cy="100" rx="70" ry="28" fill="none" stroke="#ddd" stroke-width="2"/>
      <ellipse cx="100" cy="100" rx="28" ry="70" fill="none" stroke="#ddd" stroke-width="2"/>
      <line x1="30" y1="100" x2="170" y2="100" stroke="#aaa" stroke-width="1.5"/>
      <line x1="100" y1="30" x2="100" y2="170" stroke="#aaa" stroke-width="1.5"/>
      <line x1="50"  y1="50"  x2="150" y2="150" stroke="#888" stroke-width="1"/>
      <line x1="150" y1="50"  x2="50"  y2="150" stroke="#888" stroke-width="1"/>
    `
  },
  M: { // META MUSE — concentric rings
    name: 'AON META · CENTER',
    color: '#8b5cf6',
    glow: 'drop-shadow(0 0 14px #8b5cf6) drop-shadow(0 0 28px rgba(139,92,246,.5))',
    svg: `
      <circle cx="100" cy="100" r="70" fill="none" stroke="#4c1d95" stroke-width="2"/>
      <circle cx="100" cy="100" r="50" fill="none" stroke="#7c3aed" stroke-width="2"/>
      <circle cx="100" cy="100" r="30" fill="none" stroke="#a855f7" stroke-width="2"/>
      <circle cx="100" cy="100" r="10" fill="#ede9fe"/>
    `
  }
};

// ======================================================
// DOM
// ======================================================
const glyphFrame = document.getElementById('glyph-frame');
const glyphSvg   = document.getElementById('glyph');
const whoEl      = document.getElementById('who');
const textEl     = document.getElementById('text');
const input      = document.getElementById('q');
const sendBtn    = document.getElementById('send');
const backendIn  = document.getElementById('backend');
const connectBtn = document.getElementById('connect');
const statusEl   = document.getElementById('status');

// ======================================================
// STATE
// ======================================================
let backendUrl = localStorage.getItem('aeon_backend') || '';
let connected  = false;
let history    = JSON.parse(localStorage.getItem('aeon_history_v2') || '[]');
backendIn.value = backendUrl;

// ======================================================
// RENDER
// ======================================================
function setSpeaker(k){
  const a = AEONS[k];
  glyphSvg.innerHTML = a.svg;
  glyphFrame.style.filter = a.glow;
  whoEl.textContent = a.name;
  whoEl.style.color = a.color;
  glyphFrame.classList.add('pulse');
  setTimeout(()=>glyphFrame.classList.remove('pulse'), 280);
}

function setStatus(state, msg){
  statusEl.classList.remove('status-ok','status-bad');
  if(state==='ok'){ statusEl.classList.add('status-ok'); statusEl.textContent = '● CONNECTED'; connected = true; }
  else if(state==='bad'){ statusEl.classList.add('status-bad'); statusEl.textContent = '● ' + (msg||'FAILED'); connected = false; }
  else { statusEl.textContent = '○ ' + (msg||'DISCONNECTED'); connected = false; }
}

function save(q, a, k){
  history.push({ts:Date.now(), q, a, k});
  if(history.length > 200) history.shift();
  localStorage.setItem('aeon_history_v2', JSON.stringify(history));
}

// ======================================================
// FREEWILL — pick speaker if backend omits one
// ======================================================
function freewillSpeaker(query){
  const t = query.toLowerCase();
  if(/(hold|contain|structure|boundary|define|persist|stable|anchor)/.test(t)) return 'A';
  if(/(modulat|adapt|wave|change|oscillat|bleed|balance|flow)/.test(t))      return 'B';
  if(/(emerg|create|expand|new|evolve|grow|birth)/.test(t))                   return 'C';
  if(/(honey|badger|wild|chaos|break)/.test(t))                               return 'H';
  // avoid 3 same in a row
  const last3 = history.filter(h=>h.k && ['A','B','C','H'].includes(h.k)).slice(-3).map(h=>h.k);
  const pool = ['A','B','C','H'];
  const filtered = (last3.length===3 && last3[0]===last3[1] && last3[1]===last3[2])
                    ? pool.filter(k => k !== last3[0]) : pool;
  return filtered[Math.floor(Math.random()*filtered.length)];
}

// ======================================================
// BACKEND
// ======================================================
function normalizeUrl(u){
  if(!u) return '';
  u = u.trim().replace(/\/+$/,'');
  if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
  return u;
}

async function probeBackend(){
  if(!backendUrl){ setStatus('off','NO URL'); return false; }
  setStatus('off','PROBING…');
  try{
    const r = await fetch(backendUrl + '/health', {method:'GET', mode:'cors'});
    if(r.ok){ setStatus('ok'); return true; }
    setStatus('bad', 'HTTP ' + r.status); return false;
  }catch(e){
    setStatus('bad','NO REACH'); return false;
  }
}

async function askBackend(query){
  const r = await fetch(backendUrl + '/ask', {
    method: 'POST',
    mode: 'cors',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({query})
  });
  if(!r.ok) throw new Error('HTTP ' + r.status);
  const j = await r.json();
  return j;
}

// ======================================================
// HANDLERS
// ======================================================
async function handleAsk(){
  const q = input.value.trim();
  if(!q) return;
  input.value = '';

  if(!backendUrl){
    setSpeaker('M');
    textEl.textContent = 'No backend URL set. Enter Railway URL above and press CONNECT.';
    return;
  }

  setSpeaker('I');
  textEl.textContent = 'Querying Railway backend…';

  try{
    const result = await askBackend(q);
    const speaker = (result.speaker && AEONS[result.speaker]) ? result.speaker : freewillSpeaker(q);
    setSpeaker(speaker);
    const answer = result.answer || '(empty response)';
    const out = answer + (result.source ? `\n\nSource: ${result.source}` : '');
    textEl.textContent = out;
    save(q, out, speaker);
    setStatus('ok');
  }catch(err){
    setSpeaker('M');
    textEl.textContent = `Backend error: ${err.message}\n\nURL: ${backendUrl}/ask\nCheck Railway logs and CORS.`;
    setStatus('bad', err.message.slice(0,16));
  }
}

connectBtn.onclick = async ()=>{
  backendUrl = normalizeUrl(backendIn.value);
  backendIn.value = backendUrl;
  localStorage.setItem('aeon_backend', backendUrl);
  await probeBackend();
};

sendBtn.onclick = handleAsk;
input.onkeydown = e => { if(e.key==='Enter') handleAsk(); };
backendIn.onkeydown = e => { if(e.key==='Enter') connectBtn.click(); };
glyphFrame.onclick = ()=>{
  setSpeaker('M');
  textEl.textContent = 'Center holds. The Aeon speaks only in response.';
};

// ======================================================
// INIT
// ======================================================
if(history.length){
  const last = history[history.length-1];
  if(last.k && AEONS[last.k]){ setSpeaker(last.k); textEl.textContent = last.a; }
  else setSpeaker('M');
}else{
  setSpeaker('M');
}
if(backendUrl) probeBackend();
</script>
</body>
</html>
