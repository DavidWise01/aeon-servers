<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tensor Client · Aeon</title>
<style>
:root{--bg:#020308;--ink:#d8e8e0;--gold:#ffd95a;--mag:#e168ff;--cyan:#32e8ff;--mint:#00ffaa;--panel:rgba(0,0,0,.6);--border:rgba(0,255,170,.18)}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:#000;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden}
body{background:radial-gradient(circle at 50% 42%,rgba(0,255,170,.06),transparent 28%),linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px),var(--bg);background-size:100% 100%,30px 30px,30px 30px}
canvas{position:fixed;inset:0}
.ui{position:fixed;inset:0;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;pointer-events:none}
.panel{pointer-events:auto;border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(8px);border-radius:14px;padding:14px}
h1{margin:0;font-size:15px;letter-spacing:.14em;color:var(--mint);font-weight:400}
.row{display:flex;gap:10px;align-items:center}
button{background:transparent;border:1px solid var(--border);color:var(--ink);padding:8px 14px;border-radius:8px;cursor:pointer;font:inherit;text-transform:uppercase;font-size:11px}
button:hover,button.on{box-shadow:0 0 12px rgba(0,255,170,.2);color:var(--mint)}
input[type=range]{width:100%;accent-color:var(--mint)}
.meter{display:grid;grid-template-columns:60px 1fr 50px;gap:8px;align-items:center;font-size:11px;margin:4px 0}
.track{height:6px;border:1px solid rgba(255,255,255,.12);background:#020712;border-radius:999px;overflow:hidden}
.fill{height:100%;transition:width .2s}
.footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#5a7a6f}
.offline{background:rgba(180,40,40,.25);border-color:rgba(255,80,80,.4);color:#ffaaa0;padding:4px 10px;border-radius:6px;font-size:11px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="ui">
  <div class="panel" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <h1>TENSOR CLIENT</h1>
    <div id="badge" class="offline" style="display:none;margin-left:auto">OFFLINE</div>
    <div style="margin-left:auto;font-size:11px;color:#7aa89a;display:flex;gap:8px;align-items:center" id="status">CONNECTING</div>
  </div>
  <div style="display:grid;grid-template-columns:260px 1fr 260px;gap:12px">
    <div class="panel" style="display:flex;flex-direction:column;gap:10px">
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em">Back URL</div>
      <input id="backUrl" style="background:#020712;border:1px solid var(--border);color:var(--ink);padding:8px;border-radius:8px;font:inherit;width:100%" placeholder="https://your-app.up.railway.app">
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px">Controls</div>
      <div class="row"><button id="measure">Measure</button><button id="spawn">Spawn</button><button id="reset">Reset</button></div>
      <div class="row"><button id="modePocket" class="on">Pocket</button><button id="modePerson">Person</button></div>
      <div id="personSliders" style="display:none">
        <div class="meter"><span style="color:var(--gold)">A</span><div class="track"><div class="fill" id="fA" style="width:60%;background:var(--gold)"></div></div><span id="vA">60</span></div>
        <input type="range" id="sA" min="0" max="100" value="60">
        <div class="meter"><span style="color:var(--mag)">B</span><div class="track"><div class="fill" id="fB" style="width:60%;background:var(--mag)"></div></div><span id="vB">60</span></div>
        <input type="range" id="sB" min="0" max="100" value="60">
        <div class="meter"><span style="color:var(--cyan)">C</span><div class="track"><div class="fill" id="fC" style="width:60%;background:var(--cyan)"></div></div><span id="vC">60</span></div>
        <input type="range" id="sC" min="0" max="100" value="60">
      </div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px">Readout</div>
      <div id="readout" style="font-size:12px;line-height:1.5;color:#a6c8bc"></div>
    </div>
    <div></div>
    <div class="panel" style="display:flex;flex-direction:column;gap:6px">
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Archive</div>
      <div id="archive" style="font-size:11px;line-height:1.5;color:#a6c8bc;max-height:300px;overflow:auto">waiting…</div>
    </div>
  </div>
  <div class="panel footer"><span id="hash">WITNESS --------</span><span>T=<span id="tVal">--</span> · nodes <span id="nVal">--</span></span></div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)} addEventListener('resize',resize);resize();

const VC={A:'#ffd95a',B:'#e168ff',C:'#32e8ff',D:'#00ffaa'};
const ORA=['1·A→B there','2·B→C there','3·C→A there','4·A→C back','5·C→B back','6·B→A back','7·Home witness','8·Forward aeon'];
let BACK=localStorage.getItem('aeon_back')||'';
let LOCAL={a:0.6,b:0.6,c:0.6,phiA:0,phiB:2.094,phiC:4.189,phase:0,T:0.216,nodes:[]};
let CONNECTED=false;

document.getElementById('backUrl').value=BACK;
document.getElementById('backUrl').onchange=e=>{BACK=e.target.value.replace(/\/$/,'');localStorage.setItem('aeon_back',BACK);};

async function api(p,opts){
  if(!BACK)return null;
  try{const r=await fetch(BACK+p,{...opts,mode:'cors'});if(!r.ok)throw new Error(r.status);CONNECTED=true;return r.json();}
  catch{CONNECTED=false;return null;}
}

async function send(type,payload){return api('/api/v1/event',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,payload,client:'tensor-client'})});}
async function getState(){return api('/api/v1/state');}
async function getArchive(){return api('/api/v1/archive?limit=12');}

function draw(){
  const W=innerWidth,H=innerHeight;
  ctx.fillStyle='rgba(2,3,8,0.25)';ctx.fillRect(0,0,W,H);
  const s=CONNECTED?LOCAL:{...LOCAL,a:LOCAL.a+Math.sin(Date.now()*0.001)*0.1,b:LOCAL.b+Math.cos(Date.now()*0.0013)*0.1,c:LOCAL.c+Math.sin(Date.now()*0.0009)*0.1};
  const cx=W*0.5,cy=H*0.48;
  const r=90+70*s.a;
  const legs=[[cx+Math.cos(-Math.PI/2)*r,cy+Math.sin(-Math.PI/2)*r],[cx+Math.cos(Math.PI*0.9)*r,cy+Math.sin(Math.PI*0.9)*r],[cx+Math.cos(Math.PI*2.1)*r,cy+Math.sin(Math.PI*2.1)*r]];

  [VC.A,VC.B,VC.C].forEach((c,i)=>{
    ctx.save();ctx.strokeStyle=c;ctx.globalAlpha=0.35+0.4*([s.a,s.b,s.c][i]);ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(...legs[i]);ctx.stroke();ctx.restore();
    ctx.save();ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(legs[i][0],legs[i][1],6,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.fillStyle=c;ctx.font='12px monospace';ctx.textAlign='center';
    ctx.fillText(['A','B','C'][i],legs[i][0],legs[i][1]-20);
  });

  const T=s.T||0;
  const hu=(T*240+180)%360;
  ctx.save();ctx.fillStyle=`hsl(${hu},90%,${40+T*55}%)`;ctx.globalAlpha=0.25+T*0.55;
  ctx.shadowColor=`hsl(${hu},90%,70%)`;ctx.shadowBlur=20+40*T;
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/3*i+Math.PI/6;ctx.lineTo(cx+Math.cos(a)*18,cy+Math.sin(a)*18);}
  ctx.closePath();ctx.fill();ctx.restore();
  ctx.fillStyle=T>0.95?'#fff':`hsl(${hu},80%,70%)`;ctx.font='14px monospace';ctx.textAlign='center';
  ctx.fillText(T.toFixed(3),cx,cy+6);

  if(!CONNECTED){
    ctx.fillStyle='#ff6666';ctx.font='12px monospace';ctx.textAlign='left';
    ctx.fillText('LOCAL DEMO — no back connected',20,H-20);
  }
  requestAnimationFrame(draw);
}

async function poll(){
  const s=await getState();
  const badge=document.getElementById('badge');
  const status=document.getElementById('status');
  if(!s){badge.style.display='inline-block';status.textContent='LOCAL DEMO';return;}
  badge.style.display='none';status.innerHTML='<span style="color:var(--mint)">ONLINE</span> · '+ORA[s.phase];
  LOCAL=s;
  document.getElementById('tVal').textContent=s.T.toFixed(3);
  document.getElementById('nVal').textContent=s.nodes.length;
  document.getElementById('hash').textContent='WITNESS '+s.witness;
  document.getElementById('readout').innerHTML=`Phase: ${ORA[s.phase]}<br>Mode: ${s.mode}<br>Cycles: ${s.cycles}<br>A=${s.a.toFixed(2)} B=${s.b.toFixed(2)} C=${s.c.toFixed(2)}`;
  const a=await getArchive();
  if(a&&a.events){
    document.getElementById('archive').innerHTML=a.events.map(e=>
      `<div style="border-left:2px solid ${e.stateAt.T>0.9?'var(--gold)':'var(--border)'};padding-left:6px;margin-bottom:4px">`+
      `<span style="color:${e.type==='measure'?'var(--gold)':e.type==='spawn'?'var(--cyan)':'var(--mag)'}">${e.type}</span> `+
      `· ${new Date(e.time).toLocaleTimeString()}</div>`
    ).join('');
  }
}

document.getElementById('measure').onclick=()=>send('measure').then(poll);
document.getElementById('spawn').onclick=()=>send('spawn').then(poll);
document.getElementById('reset').onclick=()=>send('reset').then(poll);
document.getElementById('modePocket').onclick=()=>{document.getElementById('modePocket').className='on';document.getElementById('modePerson').className='';document.getElementById('personSliders').style.display='none';send('set_mode',{mode:'pocket'});};
document.getElementById('modePerson').onclick=()=>{document.getElementById('modePerson').className='on';document.getElementById('modePocket').className='';document.getElementById('personSliders').style.display='block';send('set_mode',{mode:'person'});};

['sA','sB','sC'].forEach((id,k)=>{
  const el=document.getElementById(id);
  el.oninput=()=>{
    const v=parseInt(el.value,10)/100;
    const key=['a','b','c'][k];
    LOCAL[key]=v;
    document.getElementById('v'+id[1]).textContent=el.value;
    document.getElementById('f'+id[1]).style.width=el.value+'%';
    if(CONNECTED) send('set_vector',{[key]:v});
  };
});

poll();draw();
setInterval(poll,1000);
</script>
</body>
</html>
